apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-dag-processor
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-dag-processor
  template:
    metadata:
      labels:
        app: airflow-dag-processor
    spec:
      serviceAccountName: airflow
      containers:
      - name: airflow-dag-processor
        image: apache/airflow:3.1.7
        command:
        - bash
        - -c
        - exec airflow dag-processor
        envFrom:
        - configMapRef:
            name: airflow-config
        volumeMounts:
        - name: dags
          mountPath: /opt/airflow/dags
        - name: logs
          mountPath: /opt/airflow/logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      - name: git-sync
        image: registry.k8s.io/git-sync/git-sync:v4.2.4
        env:
        - name: GITSYNC_REPO
          value: "https://github.com/nanajich-spec/Dags.git"
        - name: GITSYNC_ROOT
          value: "/git"
        - name: GITSYNC_DEST
          value: "dags"
        - name: GITSYNC_BRANCH
          value: "main"
        - name: GITSYNC_PERIOD
          value: "10s"
        - name: GITSYNC_LINK
          value: "current"
        volumeMounts:
        - name: dags
          mountPath: /git
      volumes:
      - name: dags
        emptyDir: {}
      - name: logs
        persistentVolumeClaim:
          claimName: airflow-logs
