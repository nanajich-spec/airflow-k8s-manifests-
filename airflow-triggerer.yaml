apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-triggerer
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-triggerer
  template:
    metadata:
      labels:
        app: airflow-triggerer
    spec:
      containers:
      - name: airflow-triggerer
        image: apache/airflow:3.1.7
        command:
        - airflow
        - triggerer
        envFrom:
        - configMapRef:
            name: airflow-config
