apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-create-admin
  namespace: airflow
spec:
  template:
    spec:
      serviceAccountName: airflow
      restartPolicy: OnFailure
      containers:
      - name: create-admin
        image: apache/airflow:3.1.7
        command:
        - bash
        - -c
        - |
          # Run standalone for 60 seconds to initialize all tables including auth
          timeout 60 airflow standalone > /tmp/standalone.log 2>&1 &
          STANDALONE_PID=$!
          
          # Wait for standalone to initialize tables
          for i in {1..30}; do
            if grep -q "Admin user" /tmp/standalone.log 2>/dev/null; then
              echo "Standalone initialized auth tables"
              break
            fi
            echo "Waiting for standalone to initialize... ($i/30)"
            sleep 2
          done
          
          # Kill standalone
          kill $STANDALONE_PID 2>/dev/null || true
          
          # Wait a bit for database to settle
          sleep 5
          
          # Now update password to 'admin'
          export PGPASSWORD=airflow
          psql -h postgres -U airflow -d airflow -c "
          UPDATE ab_user SET password = 'pbkdf2:sha256:260000\$lRV7XgoFaxTz1jLO\$88f806ce1c25d72ac139b0c93f28296c5d100f64233ff9a5e4b2ceebba15a9a8'
          WHERE username = 'admin';
          " || echo "Update failed, user might not exist"
          
          # Verify
          psql -h postgres -U airflow -d airflow -c "SELECT username FROM ab_user WHERE username='admin';" || echo "Verification failed"
          
          echo "Admin credentials: admin/admin"
        envFrom:
        - configMapRef:
            name: airflow-config
