apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow
data:
  # Executor Configuration
  AIRFLOW__CORE__EXECUTOR: "KubernetesExecutor"
  AIRFLOW__CORE__DATABASE_ACCESS_ISOLATION: "False"
  
  # Database Configuration
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
  
  # Kubernetes Executor Configuration
  AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE: "airflow"
  AIRFLOW__KUBERNETES_EXECUTOR__WORKER_CONTAINER_REPOSITORY: "apache/airflow"
  AIRFLOW__KUBERNETES_EXECUTOR__WORKER_CONTAINER_TAG: "3.1.7"
  AIRFLOW__KUBERNETES_EXECUTOR__WORKER_SERVICE_ACCOUNT_NAME: "airflow"
  AIRFLOW__KUBERNETES_EXECUTOR__DELETE_WORKER_PODS: "True"
  AIRFLOW__KUBERNETES_EXECUTOR__DELETE_WORKER_PODS_ON_FAILURE: "False"
  AIRFLOW__KUBERNETES_EXECUTOR__DAGS_IN_IMAGE: "False"
  AIRFLOW__KUBERNETES_EXECUTOR__MULTI_NAMESPACE_MODE: "False"
  
  # DAGs Configuration
  AIRFLOW__CORE__DAGS_FOLDER: "/opt/airflow/dags/current"
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  
  # Security
  AIRFLOW__CORE__FERNET_KEY: "aHLJUzwHfStAYmXZ8gOe_PUyaLf1qaDq8WfhKJ-QlA8="
  AIRFLOW__WEBSERVER__SECRET_KEY: "aHLJUzwHfStAYmXZ8gOe_PUyaLf1qaDq8WfhKJ-QlA8="
  
  # Logging
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: "/opt/airflow/logs"
  AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
  
  # Webserver
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
  AIRFLOW__WEBSERVER__RBAC: "True"
  
  # API
  AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
