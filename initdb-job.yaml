apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-initdb
  namespace: airflow
spec:
  template:
    spec:
      serviceAccountName: airflow
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: airflow-initdb
        image: apache/airflow:3.1.7
        command:
        - bash
        - -c
        - |
          airflow db migrate
          echo "Database migration completed successfully!"
        envFrom:
        - configMapRef:
            name: airflow-config
