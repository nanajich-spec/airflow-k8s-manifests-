apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-initdb
  namespace: airflow
spec:
  template:
    spec:
      serviceAccountName: airflow
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: 
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: airflow-initdb
        image: apache/airflow:3.1.7
        command:
        - bash
        - -c
        - |
          airflow db migrate
          
          # Create admin user using Python with FAB
          python3 << 'PYTHON_EOF'
          from airflow.www.app import create_app
          from flask import Flask
          
          app = create_app()
          with app.app_context():
              from airflow.www.fab_security.manager import SecurityManager
              appbuilder = app.appbuilder
              
              # Check if admin exists
              admin_user = appbuilder.sm.find_user(username='admin')
              
              if not admin_user:
                  # Create admin role if it doesn't exist
                  admin_role = appbuilder.sm.find_role('Admin')
                  
                  # Create admin user
                  appbuilder.sm.add_user(
                      username='admin',
                      first_name='Admin',
                      last_name='User',
                      email='admin@example.com',
                      role=admin_role,
                      password='admin'
                  )
                  print("Admin user created: admin/admin")
              else:
                  # Update password
                  admin_user.password = 'admin'
                  appbuilder.sm.update_user(admin_user)
                  print("Admin password updated: admin/admin")
          PYTHON_EOF
          
          echo "Database initialization completed successfully!"
        envFrom:
        - configMapRef:
            name: airflow-config
