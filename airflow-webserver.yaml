apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
      - name: git-sync-init
        image: registry.k8s.io/git-sync/git-sync:v4.2.4
        env:
        - name: GITSYNC_REPO
          value: "https://github.com/nanajich-spec/Dags.git"
        - name: GITSYNC_ROOT
          value: "/git"
        - name: GITSYNC_DEST
          value: "dags"
        - name: GITSYNC_BRANCH
          value: "main"
        - name: GITSYNC_ONE_TIME
          value: "true"
        volumeMounts:
        - name: dags
          mountPath: /git
      containers:
      - name: airflow-webserver
        image: apache/airflow:3.1.7
        args:
        - bash
        - -c
        - exec airflow api-server --hostname 0.0.0.0 --port 8080
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__CORE__DAGS_FOLDER
          value: "/git/Dags.git"
        envFrom:
        - configMapRef:
            name: airflow-config
        volumeMounts:
        - name: dags
          mountPath: /git
        - name: logs
          mountPath: /opt/airflow/logs
      - name: git-sync
        image: registry.k8s.io/git-sync/git-sync:v4.2.4
        env:
        - name: GITSYNC_REPO
          value: "https://github.com/nanajich-spec/Dags.git"
        - name: GITSYNC_ROOT
          value: "/git"
        - name: GITSYNC_DEST
          value: "dags"
        - name: GITSYNC_BRANCH
          value: "main"
        - name: GITSYNC_PERIOD
          value: "10s"
        volumeMounts:
        - name: dags
          mountPath: /git
      volumes:
      - name: dags
        emptyDir: {}
      - name: logs
        persistentVolumeClaim:
          claimName: airflow-logs
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
